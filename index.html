                        <div class="stat-badge chapters" title="Chapters"><span>${dayData.summary.chapters}</span></div>
                        <div class="stat-badge titles" title="Titles"><span>${dayData.summary.titles}</span></div>
                        <div class="stat-badge started ${dayData.summary.started > 0 ? 'clickable' : ''}" data-titles="${startedAttr}" title="Started"><span>${dayData.summary.started}</span></div>
                        <div class="stat-badge finished ${dayData.summary.finished > 0 ? 'clickable' : ''}" data-titles="${finishedAttr}" title="Finished"><span>${dayData.summary.finished}</span></div>
                    </div>` : ''}
                    
                    ${firstEntryHtml}
                    ${restEntriesHtml ? `<div class="entries-dropdown">${restEntriesHtml}</div>` : ''}
                    ${(!hasEntries && !dayData.isFuture) ? `<div class="empty-state-text show">Nothing planned</div>` : ''}
                </div>
            `;
            
            dayDiv.innerHTML = html;
            
            if (!dayData.isFuture && hasEntries) {
                dayDiv.addEventListener('click', function (e) {
                    if (e.target.closest('.cal-entry-card.clickable') || e.target.closest('em')) return;
                    const badge = e.target.closest('.stat-badge.started.clickable, .stat-badge.finished.clickable');
                    if (badge) {
                        const titlesData = badge.getAttribute('data-titles');
                        if (titlesData) { 
                            const titles = JSON.parse(decodeURIComponent(titlesData)); 
                            if (titles.length > 0) { 
                                const type = badge.classList.contains('started') ? 'Started' : 'Finished'; 
                                alert(`${type} on Day ${day}:\n\n- ${titles.join('\n- ')}`); 
                            } 
                        } return;
                    }
                    this.classList.toggle('expanded');
                });
            }
            calendarEl.appendChild(dayDiv);
        }
        
        const styleBlock = document.createElement('style');
        styleBlock.innerHTML = `@media(max-width:768px){.empty-grid-cell{display:none!important;}}`;
        calendarEl.appendChild(styleBlock);

        calRenderTimelineChart(processed); 
        calRenderMonthlyChart();
    }

    window.calEditChapters = async function (cacheKey, day, entryId, e) {
        e.preventDefault(); e.stopPropagation();
        let entry = calGlobalCache[cacheKey].processed.days[day].entriesList.find(x => x.id == entryId); 
        if (!entry) return;
        let newVal = prompt(`Edit chapters read for ${entry.title} on Day ${day}:`, entry.chaptersRead);
        if (newVal !== null && !isNaN(newVal) && newVal.trim() !== '') {
            entry.chaptersRead = parseInt(newVal); let dChaps = 0;
            calGlobalCache[cacheKey].processed.days[day].entriesList.forEach(x => { if (x.type !== 'ANIME') dChaps += x.chaptersRead; });
            calGlobalCache[cacheKey].processed.days[day].summary.chapters = dChaps; 
            await saveMonthToDB(cacheKey, calGlobalCache[cacheKey]);
            calRenderUI(calGlobalCache[cacheKey]);
        }
    };

    function calRenderTimelineChart(processed) {
        const ctx = document.getElementById('calActivityChart')?.getContext('2d'); 
        if(!ctx) return;
        if (calActivityChartInstance) calActivityChartInstance.destroy(); 
        if (!processed) return;
        
        const daysInMonth = new Date(calCurrentYear, calCurrentMonth + 1, 0).getDate(); 
        const labels = [], chaptersData = [], startedData = [], finishedData = [];
        for (let day = 1; day <= daysInMonth; day++) {
            labels.push(day);
            if (processed.days[day] && !processed.days[day].isFuture) { 
                chaptersData.push(processed.days[day].summary.chapters); 
                startedData.push(processed.days[day].summary.started); 
                finishedData.push(processed.days[day].summary.finished); 
            } else { 
                chaptersData.push(0); startedData.push(0); finishedData.push(0); 
            }
        }
        
        let maxChapters = Math.max(...chaptersData, 2); let maxTitles = Math.max(...startedData, ...finishedData, 1);
        let chapterScaleMax = Math.ceil(maxChapters * 1.1); let titleScaleMax = Math.ceil(maxTitles * 2.2);
        
        calActivityChartInstance = new Chart(ctx, {
            type: 'line', 
            data: { 
                labels: labels, 
                datasets: [
                    { label: 'Chapters Read', data: chaptersData, borderColor: '#00b0ff', backgroundColor: 'rgba(0, 176, 255, 0.15)', yAxisID: 'y-chapters', fill: true, tension: .3, borderWidth: 2, pointRadius: 3, pointBackgroundColor: '#00b0ff' }, 
                    { label: 'Titles Started', data: startedData, borderColor: '#69f0ae', backgroundColor: '#69f0ae', yAxisID: 'y-titles', type: 'bar', barPercentage: .5, borderRadius: 4 }, 
                    { label: 'Titles Finished', data: finishedData, borderColor: '#b39ddb', backgroundColor: '#b39ddb', yAxisID: 'y-titles', type: 'bar', barPercentage: .5, borderRadius: 4 }
                ] 
            },
            options: { 
                responsive: true, 
                maintainAspectRatio: false, 
                interaction: { mode: 'index', intersect: false }, 
                scales: { 
                    x: { grid: { color: 'rgba(255, 255, 255, 0.05)' }, ticks: { color: '#9fadbd' } }, 
                    'y-chapters': { type: 'linear', display: true, position: 'left', max: chapterScaleMax, title: { display: true, text: 'Chapters Read', color: '#00b0ff', font: { weight: 'bold' } }, grid: { color: 'rgba(255, 255, 255, 0.05)' }, ticks: { color: '#9fadbd', precision: 0 }, beginAtZero: true }, 
                    'y-titles': { type: 'linear', display: true, position: 'right', max: titleScaleMax, title: { display: true, text: 'Titles (Started/Finished)', color: '#e3e5e8', font: { weight: 'bold' } }, grid: { drawOnChartArea: false }, ticks: { color: '#9fadbd', precision: 0 }, beginAtZero: true } 
                }, 
                plugins: { 
                    legend: { labels: { color: '#e3e5e8', font: { family: "'Inter', sans-serif" } } }, 
                    tooltip: { backgroundColor: 'rgba(20, 20, 20, 0.95)', titleColor: '#fff', bodyColor: '#e3e5e8', borderColor: 'rgba(255, 255, 255, 0.1)', borderWidth: 1, padding: 10 } 
                } 
            }
        });
    }

    function calRenderMonthlyChart() {
        const ctx = document.getElementById('calMonthlyChart')?.getContext('2d'); 
        if(!ctx) return;
        if (calMonthlyChartInstance) calMonthlyChartInstance.destroy();
        
        const viewScore = calCurrentYear * 12 + calCurrentMonth;
        const validKeys = Object.keys(calGlobalCache).filter(k => k.includes('_')).filter(k => { 
            const [y, m] = k.split('_').map(Number); return (y * 12 + m) <= viewScore; 
        }).sort((a, b) => { 
            const [aY, aM] = a.split('_').map(Number); const [bY, bM] = b.split('_').map(Number); return (aY * 12 + aM) - (bY * 12 + bM); 
        });
        
        if (validKeys.length === 0) return;
        
        const labels = [], monthlyData = [], cumulativeData = [];
        validKeys.forEach(key => {
            const [y, m] = key.split('_').map(Number); const shortYear = String(y).slice(-2); labels.push(`${calMonthNames[m].substring(0, 3)} '${shortYear}`);
            const data = calGlobalCache[key]; monthlyData.push(data.processed.stats.chapters || 0); cumulativeData.push(data.allTimeChapters || 0);
        });
        
        calMonthlyChartInstance = new Chart(ctx, {
            data: { 
                labels: labels, 
                datasets: [
                    { type: 'line', label: 'Total Chapters', data: cumulativeData, borderColor: '#f39c12', backgroundColor: 'rgba(243, 156, 18, 0.1)', yAxisID: 'y-cumulative', fill: true, tension: .3, borderWidth: 3, pointRadius: 4, pointBackgroundColor: '#f39c12' }, 
                    { type: 'bar', label: 'Monthly Chapters', data: monthlyData, backgroundColor: '#00b0ff', yAxisID: 'y-monthly', borderRadius: 4 }
                ] 
            },
            options: { 
                responsive: true, 
                maintainAspectRatio: false, 
                interaction: { mode: 'index', intersect: false }, 
                scales: { 
                    x: { grid: { color: 'rgba(255, 255, 255, 0.05)' }, ticks: { color: '#9fadbd', font: { weight: 'bold' } } }, 
                    'y-monthly': { type: 'linear', display: true, position: 'left', title: { display: true, text: 'Monthly Chapters', color: '#00b0ff', font: { weight: 'bold' } }, grid: { color: 'rgba(255, 255, 255, 0.05)' }, ticks: { color: '#9fadbd', precision: 0 }, beginAtZero: true }, 
                    'y-cumulative': { type: 'linear', display: true, position: 'right', title: { display: true, text: 'Total Chapters', color: '#ffffff', font: { weight: 'bold' } }, grid: { drawOnChartArea: false }, ticks: { color: '#9fadbd', precision: 0 }, beginAtZero: false } 
                }, 
                plugins: { 
                    legend: { labels: { color: '#e3e5e8', font: { family: "'Inter', sans-serif" } } }, 
                    tooltip: { backgroundColor: 'rgba(20, 20, 20, 0.95)', titleColor: '#fff', bodyColor: '#e3e5e8', borderColor: 'rgba(255, 255, 255, 0.1)', borderWidth: 1, padding: 10, callbacks: { label: function (context) { return context.dataset.label + ': ' + context.parsed.y.toLocaleString(); } } } 
                } 
            }
        });
    }

    // --- Advanced Stats ---
    function getWeekInfo(date) {
        let d = new Date(date.getTime()); d.setHours(0, 0, 0, 0); let dayOfWeek = d.getDay();
        let sun = new Date(d.getTime() - dayOfWeek * 86400000); let sat = new Date(sun.getTime() + 6 * 86400000); let pad = n => String(n).padStart(2, '0');
        let label = `${pad(sun.getMonth() + 1)}/${pad(sun.getDate())}/${String(sun.getFullYear()).slice(-2)}-${pad(sat.getMonth() + 1)}/${pad(sat.getDate())}/${String(sat.getFullYear()).slice(-2)}`;
        return { label: label, startDay: sun.getDate(), startMonth: sun.getMonth(), startYear: sun.getFullYear(), daysArray: Array.from({ length: 7 }, (_, i) => new Date(sun.getTime() + i * 86400000).getDate()) };
    }

    function calUpdateAdvancedStats() {
        let gChapters = 0, gTitles = new Set(), gStarted = 0, gFinished = 0; 
        let yChapters = 0, yTitles = new Set(), yStarted = 0, yFinished = 0;
        
        for (let key in calGlobalCache) {
            if (!key.includes('_')) continue; 
            let [y, m] = key.split('_').map(Number); 
            let data = calGlobalCache[key].processed; 
            if (!data) continue;
            
            for (let day in data.days) {
                let d = data.days[day]; if (!d.entriesList) continue;
                d.entriesList.forEach(e => {
                    if (e.type !== 'ANIME') {
                        let titleKey = e.id || e.title; 
                        gChapters += e.chaptersRead; gTitles.add(titleKey); 
                        if (e.isStarted) gStarted++; if (e.isCompleted) gFinished++;
                        if (y === calCurrentYear) { yChapters += e.chaptersRead; yTitles.add(titleKey); if (e.isStarted) yStarted++; if (e.isCompleted) yFinished++; }
                    }
                });
            }
        }
        
        if ($('cal-adv-g-chap')) $('cal-adv-g-chap').innerText = gChapters.toLocaleString();
        if ($('cal-adv-g-tit')) $('cal-adv-g-tit').innerText = gTitles.size.toLocaleString();
        if ($('cal-adv-g-start')) $('cal-adv-g-start').innerText = gStarted.toLocaleString();
        if ($('cal-adv-g-fin')) $('cal-adv-g-fin').innerText = gFinished.toLocaleString();
        if ($('cal-adv-y-label')) $('cal-adv-y-label').innerText = `${calCurrentYear} Stats`;
        if ($('cal-adv-y-chap')) $('cal-adv-y-chap').innerText = yChapters.toLocaleString();
        if ($('cal-adv-y-tit')) $('cal-adv-y-tit').innerText = yTitles.size.toLocaleString();
        if ($('cal-adv-y-start')) $('cal-adv-y-start').innerText = yStarted.toLocaleString();
        if ($('cal-adv-y-fin')) $('cal-adv-y-fin').innerText = yFinished.toLocaleString();
    }

    function calOpenAdvModal() {
        calUpdateAdvancedStats(); 
        let allDays = [];
        
        for (let k in calGlobalCache) {
            if (!k.includes('_')) continue; 
            let [y, m] = k.split('_').map(Number); 
            let days = calGlobalCache[k].processed?.days; 
            if (!days) continue;
            
            for (let d in days) {
                if (!days[d].entriesList) continue; 
                let dayChaps = 0, dayStart = 0, dayFin = 0;
                days[d].entriesList.forEach(e => { 
                    if (e.type === 'ANIME') return; 
                    dayChaps += e.chaptersRead || 0; 
                    dayStart += e.isStarted ? 1 : 0; 
                    dayFin += e.isCompleted ? 1 : 0; 
                });
                if (dayChaps > 0 || dayStart > 0 || dayFin > 0) { 
                    allDays.push({ y, m, d: parseInt(d), ts: new Date(y, m, parseInt(d)).getTime(), chaps: dayChaps, start: dayStart, fin: dayFin }); 
                }
            }
        }
        
        allDays.sort((a, b) => a.ts - b.ts);
        
        let lb = { chapters: { years: {}, months: {}, weeks: {}, days: {}, streaks: [] }, started: { years: {}, months: {}, weeks: {}, days: {}, streaks: [] }, finished: { years: {}, months: {}, weeks: {}, days: {}, streaks: [] } };
        let pad = n => String(n).padStart(2, '0');
        
        allDays.forEach(day => {
            let dateStr = `${pad(day.m + 1)}/${pad(day.d)}/${String(day.y).slice(-2)}`, monthStr = `${calMonthNames[day.m].substring(0,3)} ${day.y}`, yearStr = `${day.y}`, dt = new Date(day.y, day.m, day.d), wInfo = getWeekInfo(dt), weekStr = wInfo.label;
            ['chapters', 'started', 'finished'].forEach(m => {
                let v = m === 'chapters' ? day.chaps : (m === 'started' ? day.start : day.fin);
                if (v > 0) {
                    if (!lb[m].days[dateStr]) lb[m].days[dateStr] = { val: 0, y: day.y, m: day.m, d: day.d }; lb[m].days[dateStr].val += v;
                    if (!lb[m].weeks[weekStr]) lb[m].weeks[weekStr] = { val: 0, y: wInfo.startYear, m: wInfo.startMonth, days: wInfo.daysArray }; lb[m].weeks[weekStr].val += v;
                    if (!lb[m].months[monthStr]) lb[m].months[monthStr] = { val: 0, y: day.y, m: day.m }; lb[m].months[monthStr].val += v;
                    if (!lb[m].years[yearStr]) lb[m].years[yearStr] = { val: 0, y: day.y }; lb[m].years[yearStr].val += v;
                }
            });
        });
        
        ['chapters', 'started', 'finished'].forEach(m => {
            let currentStreak = 0; let currentStart = null; let currentEnd = null; let lastTs = 0;
            let addStreak = () => { 
                if (currentStreak > 0) { 
                    let sStr = `${pad(currentStart.m + 1)}/${pad(currentStart.d)}/${String(currentStart.y).slice(-2)}`, eStr = `${pad(currentEnd.m + 1)}/${pad(currentEnd.d)}/${String(currentEnd.y).slice(-2)}`, label = currentStreak === 1 ? sStr : `${sStr} - ${eStr}`; 
                    lb[m].streaks.push({ label: label, val: currentStreak, y: currentStart.y, m: currentStart.m, d: currentStart.d }); 
                } 
            };
            
            for (let i = 0; i < allDays.length; i++) {
                let day = allDays[i], v = m === 'chapters' ? day.chaps : (m === 'started' ? day.start : day.fin);
                if (v > 0) { 
                    if (currentStreak === 0) { 
                        currentStreak = 1; currentStart = day; currentEnd = day; lastTs = day.ts; 
                    } else { 
                        let diffDays = Math.round((day.ts - lastTs) / 86400000); 
                        if (diffDays === 1) { currentStreak++; currentEnd = day; lastTs = day.ts; } 
                        else { addStreak(); currentStreak = 1; currentStart = day; currentEnd = day; lastTs = day.ts; } 
                    } 
                } else { addStreak(); currentStreak = 0; }
            }
            addStreak();
        });
        
        let sortObj = (obj) => Object.entries(obj).map(([k, v]) => ({ label: k, ...v })).sort((a, b) => b.val - a.val);
        
        ['chapters', 'started', 'finished'].forEach(m => { 
            calLbData[m].years = sortObj(lb[m].years); 
            calLbData[m].months = sortObj(lb[m].months); 
            calLbData[m].weeks = sortObj(lb[m].weeks); 
            calLbData[m].days = sortObj(lb[m].days); 
            calLbData[m].streaks = lb[m].streaks.sort((a, b) => b.val - a.val); 
        });
        
        calLbPageIdx = { streaks: 0, years: 0, months: 0, weeks: 0, days: 0 }; 
        calSetLbMode('chapters');
        $('cal-adv-overlay').style.display = 'block'; 
        $('cal-adv-modal').style.display = 'block';
    }

    function calCloseAdvModal() { 
        $('cal-adv-overlay').style.display = 'none'; 
        $('cal-adv-modal').style.display = 'none'; 
    }

    function calSetLbMode(mode) {
        calLbMode = mode;
        ['chapters', 'started', 'finished'].forEach(m => {
            let btn = $(`cal-lb-btn-${m}`);
            if (btn) { 
                if (m === mode) { btn.style.background = 'var(--accent)'; btn.style.color = '#000'; btn.style.borderColor = 'var(--accent)'; } 
                else { btn.style.background = 'rgba(0,0,0,0.4)'; btn.style.color = 'var(--highlight)'; btn.style.borderColor = 'var(--glass-border)'; } 
            }
        });
        calLbPageIdx = { streaks: 0, years: 0, months: 0, weeks: 0, days: 0 };
        ['streaks', 'years', 'months', 'weeks', 'days'].forEach(c => calRenderLbCol(c));
    }

    function calLbPage(category, dir) {
        let arr = calLbData[calLbMode][category], maxPage = Math.max(0, Math.ceil(arr.length / 10) - 1), newPage = calLbPageIdx[category] + dir;
        if (newPage < 0 || newPage > maxPage) return; 
        calLbPageIdx[category] = newPage; 
        calRenderLbCol(category);
    }

    function calRenderLbCol(category) {
        let listEl = $(`cal-lb-${category}-list`); 
        if (!listEl) return;
        
        let arr = calLbData[calLbMode][category], page = calLbPageIdx[category], start = page * 10, slice = arr.slice(start, start + 10);
        
        if (slice.length === 0) { 
            listEl.innerHTML = `<div style="text-align:center; color:var(--text-muted); font-size:11px; margin-top:20px;">No data</div>`; 
        } else {
            listEl.innerHTML = slice.map((item, idx) => {
                let rank = start + idx + 1, title = item.label, val = item.val, color = 'var(--accent)', unit = category === 'streaks' ? ' days' : '';
                let clickFn = '';
                if (category === 'years') clickFn = `calJumpToDate(${item.y}, 0, 1)`; 
                else if (category === 'months') clickFn = `calJumpToDate(${item.y}, ${item.m}, 1)`; 
                else if (category === 'days') clickFn = `calJumpToDate(${item.y}, ${item.m}, ${item.d})`; 
                else if (category === 'streaks') clickFn = `calJumpToDate(${item.y}, ${item.m}, ${item.d})`; 
                else if (category === 'weeks') clickFn = `calJumpToDate(${item.y}, ${item.m}, ${item.days[0] || 1})`;
                
                return `<div style="display:flex; justify-content:space-between; align-items:center; padding:6px 0; border-bottom:1px solid rgba(255,255,255,0.05); font-size:12px;"><div style="display:flex; align-items:center; gap:6px; overflow:hidden;"><span style="color:var(--accent); font-weight:bold; width:20px; text-align:right; flex-shrink:0;">${rank}.</span><span class="lb-clickable" style="white-space:nowrap; overflow:hidden; text-overflow:ellipsis; transition:0.2s;" title="${title.replace(/"/g, '&quot;')}" onclick="${clickFn}">${title}</span></div><div style="color:${color}; font-weight:bold; flex-shrink:0; margin-left:8px;">${val.toLocaleString()}${unit}</div></div>`;
            }).join('');
        }
        
        let prevBtn = $(`cal-lb-${category}-prev`), nextBtn = $(`cal-lb-${category}-next`);
        if (prevBtn) prevBtn.style.opacity = page === 0 ? '0.3' : '1';
        if (nextBtn) nextBtn.style.opacity = page >= Math.ceil(arr.length / 10) - 1 || arr.length === 0 ? '0.3' : '1';
    }

</script>
</body>
